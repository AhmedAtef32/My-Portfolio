<div
  class="rounded-3xl border border-[var(--border)] bg-[var(--surface)] p-6 md:p-8 transition-all duration-300 shadow-sm">

  <form
    action="https://api.web3forms.com/submit"
    method="POST"
    class="space-y-6">

    <input
      type="hidden"
      name="access_key"
      value="eaf0101b-9564-4a44-b986-78bbcdd80fa0">

    <!-- Name -->
    <div>

      <label
        for="name"
        class="mb-2 block text-sm font-medium text-[var(--text)]">

        Full Name

      </label>

      <input
        id="name"
        name="name"
        type="text"
        required
        autocomplete="name"
        placeholder="Enter your full name"
        class="w-full rounded-xl border border-[var(--border)] bg-[var(--background)] px-4 py-3 text-[var(--text)] outline-none transition-all duration-300 placeholder:text-[var(--muted)] hover:border-main focus:border-main focus:ring-4 focus:ring-main/10">

    </div>

    <!-- Email -->
    <div>

      <label
        for="email"
        class="mb-2 block text-sm font-medium text-[var(--text)]">

        Email Address

      </label>

      <input
        id="email"
        name="email"
        type="email"
        required
        autocomplete="email"
        placeholder="Enter your email"
        class="w-full rounded-xl border border-[var(--border)] bg-[var(--background)] px-4 py-3 text-[var(--text)] outline-none transition-all duration-300 placeholder:text-[var(--muted)] hover:border-main focus:border-main focus:ring-4 focus:ring-main/10">

    </div>

    <!-- Subject -->
    <div>

      <label
        for="subject"
        class="mb-2 block text-sm font-medium text-[var(--text)]">

        Subject

      </label>

      <input
        id="subject"
        name="subject"
        type="text"
        autocomplete="off"
        placeholder="Project Discussion"
        class="w-full rounded-xl border border-[var(--border)] bg-[var(--background)] px-4 py-3 text-[var(--text)] outline-none transition-all duration-300 placeholder:text-[var(--muted)] hover:border-main focus:border-main focus:ring-4 focus:ring-main/10">

    </div>

    <!-- Message -->
    <div>

      <label
        for="message"
        class="mb-2 block text-sm font-medium text-[var(--text)]">

        Message

      </label>

      <textarea
        id="message"
        name="message"
        rows="6"
        required
        placeholder="Tell me about your project..."
        class="w-full resize-none rounded-xl border border-[var(--border)] bg-[var(--background)] px-4 py-3 text-[var(--text)] outline-none transition-all duration-300 placeholder:text-[var(--muted)] hover:border-main focus:border-main focus:ring-4 focus:ring-main/10"></textarea>

    </div>

    <button
      type="submit"
      class="group flex w-full cursor-pointer items-center justify-center gap-3 rounded-2xl bg-main px-8 py-4 font-medium text-white shadow-lg shadow-main/20 transition-all duration-300 hover:-translate-y-1 hover:shadow-xl hover:shadow-main/30 md:w-fit">

      <span>Send Message</span>

      <i class="pi pi-send transition-transform duration-300 group-hover:translate-x-1"></i>

    </button>

    <p class="text-sm text-[var(--muted)]">
      I'll get back to you as soon as possible.
    </p>

  </form>

</div>
