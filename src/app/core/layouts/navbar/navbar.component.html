<nav class="bg-[#000000] py-4 fixed top-0 w-full z-50 shadow-lg">
  <div class="container mx-auto px-4">
    <div class="flex items-center justify-between">
      <div class="text-white text-2xl font-bold">
        <a routerLink="/home"
          ><span class="text-main font-medium">Ahmed</span> Atef</a
        >
      </div>

      <div class="hidden md:block">
        <ul class="flex space-x-8">
          <li class="my-4">
            <a
              data-aos="fade-down"
              [attr.data-aos-delay]="300"
              data-aos-duration="700"
              routerLinkActive="text-main!"
              routerLink="/home"
              class="text-white hover:text-main font-medium transition-colors duration-300"
              >Home</a
            >
          </li>
          <li class="my-4">
            <a
              data-aos="fade-down"
              [attr.data-aos-delay]="500"
              data-aos-duration="700"
              routerLinkActive="text-main!"
              routerLink="/about"
              class="text-white hover:text-main font-medium transition-colors duration-300"
              >About</a
            >
          </li>

          <li class="my-4">
            <a
              data-aos="fade-down"
              [attr.data-aos-delay]="700"
              data-aos-duration="700"
              routerLinkActive="text-main!"
              routerLink="/projects"
              class="text-white hover:text-main font-medium transition-colors duration-300"
              >Projects</a
            >
          </li>

          <li class="my-4">
            <a
              data-aos="fade-down"
              [attr.data-aos-delay]="900"
              data-aos-duration="700"
              routerLinkActive="text-main!"
              routerLink="/contact"
              class="text-white hover:text-main font-medium transition-colors duration-300"
              >Contact</a
            >
          </li>
        </ul>
      </div>

      <div class="hidden md:flex items-center gap-4">
        <button
          type="button"
          class="theme-toggle-btn text-white border border-gray-800 rounded-full size-4 cursor-pointer hover:bg-main transition-all duration-300"
          (click)="toggleTheme()"
          [attr.aria-label]="
            isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'
          "
        >
          <i
            class="pi"
            [class.pi-sun]="isDarkMode"
            [class.pi-moon]="!isDarkMode"
          ></i>
        </button>
        <a
          href="Ahmed Atef CV.pdf"
          target="_blank"
          download="Ahmed Atef CV"
          class="text-white py-2 px-6 border border-gray-800 rounded-2xl cursor-pointer hover:bg-main transition-all duration-300"
        >
          Download My CV <i class="ps-2 pi pi-download"></i
        ></a>
      </div>

      <div class="icons  flex items-center gap-3 md:hidden">
        <button
          type="button"
          class="theme-toggle-btn hidden md:block text-white border border-gray-800 rounded-full size-4 cursor-pointer hover:bg-main transition-all duration-300"
          (click)="toggleTheme()"
          [attr.aria-label]="
            isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'
          "
        >
          <i
            class="pi"
            [class.pi-sun]="isDarkMode"
            [class.pi-moon]="!isDarkMode"
          ></i>
        </button>
        <p-button
          type="button"
          (click)="visible2 = true"
          icon="pi pi-bars"
          [style]="{
            backgroundColor: 'transparent',
            border: 'none',
            color: 'var(--text)',
            fontSize: '2rem',
          }"
        />
      </div>
    </div>
  </div>
</nav>

<p-drawer
  [style]="{
    backgroundColor: 'var(--surface)',
    border: 'none',
    color: 'var(--text)',
  }"
  header="Ahmed Atef"
  [(visible)]="visible2"
  position="right"
>
  <ul>
    <li class="my-4 text-center">
      <a
        (click)="visible2 = false"
        routerLinkActive="text-main!"
        routerLink="/home"
        class="text-white hover:text-main font-medium transition-colors duration-300"
        >Home</a
      >
    </li>
    <li class="my-4 text-center">
      <a
        (click)="visible2 = false"
        routerLinkActive="text-main!"
        routerLink="/about"
        class="text-white hover:text-main font-medium transition-colors duration-300"
        >About</a
      >
    </li>

    <li class="my-4 text-center">
      <a
        (click)="visible2 = false"
        routerLinkActive="text-main!"
        routerLink="/projects"
        class="text-white hover:text-main font-medium transition-colors duration-300"
        >Projects</a
      >
    </li>

    <li class="my-4 text-center">
      <a
        (click)="visible2 = false"
        routerLinkActive="text-main!"
        routerLink="/contact"
        class="text-white hover:text-main font-medium transition-colors duration-300"
        >Contact</a
      >
    </li>

    <li class="my-4">
      <button
        type="button"
        class="w-full text-center text-white py-2 px-6 border border-gray-800 rounded-2xl cursor-pointer hover:bg-main transition-all duration-300"
        (click)="toggleTheme()"
      >
        <i
          class="pi"
          [class.pi-sun]="isDarkMode"
          [class.pi-moon]="!isDarkMode"
        ></i>
        <span class="ps-2">{{ isDarkMode ? "Light mode" : "Dark mode" }}</span>
      </button>
    </li>
    <li class="my-4">
      <a
        href="Ahmed_Atef_CV.pdf (1).pdf"
        target="_blank"
        download="Ahmed Atef CV"
        class="text-white py-2 px-6 border border-gray-800 rounded-2xl cursor-pointer block text-center hover:bg-main transition-all duration-300"
      >
        Download My CV <i class="ps-2 pi pi-download"></i
      ></a>
    </li>
  </ul>
</p-drawer>
