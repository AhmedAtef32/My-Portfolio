<div
  class="rounded-2xl border border-gray-200 bg-white p-6 transition-colors duration-300 dark:border-white/10 dark:bg-[#18181b] md:p-8"
>
  <form
    action="https://api.web3forms.com/submit"
    method="POST"
    class="space-y-6"
  >
    <input
      type="hidden"
      name="access_key"
      value="eaf0101b-9564-4a44-b986-78bbcdd80fa0"
    />

    <!-- Name -->
    <div>
      <label
        for="name"
        class="mb-2 block text-sm font-medium text-gray-800 dark:text-white"
      >
        Full Name
      </label>

      <input
        id="name"
        name="name"
        type="text"
        required
        placeholder="Enter your full name"
        class="w-full rounded-xl border border-gray-300 bg-gray-50 px-4 py-3 text-gray-900 outline-none transition-all duration-300 placeholder:text-gray-500 hover:border-main focus:border-main dark:border-white/10 dark:bg-[#121214] dark:text-white dark:placeholder:text-gray-500"
      />
    </div>

    <!-- Email -->
    <div>
      <label
        for="email"
        class="mb-2 block text-sm font-medium text-gray-800 dark:text-white"
      >
        Email Address
      </label>

      <input
        id="email"
        name="email"
        type="email"
        required
        placeholder="Enter your email"
        class="w-full rounded-xl border border-gray-300 bg-gray-50 px-4 py-3 text-gray-900 outline-none transition-all duration-300 placeholder:text-gray-500 hover:border-main focus:border-main dark:border-white/10 dark:bg-[#121214] dark:text-white dark:placeholder:text-gray-500"
      />
    </div>

    <!-- Subject -->
    <div>
      <label
        for="subject"
        class="mb-2 block text-sm font-medium text-gray-800 dark:text-white"
      >
        Subject
      </label>

      <input
        id="subject"
        name="subject"
        type="text"
        placeholder="Project Discussion"
        class="w-full rounded-xl border border-gray-300 bg-gray-50 px-4 py-3 text-gray-900 outline-none transition-all duration-300 placeholder:text-gray-500 hover:border-main focus:border-main dark:border-white/10 dark:bg-[#121214] dark:text-white dark:placeholder:text-gray-500"
      />
    </div>

    <!-- Message -->
    <div>
      <label
        for="message"
        class="mb-2 block text-sm font-medium text-gray-800 dark:text-white"
      >
        Message
      </label>

      <textarea
        id="message"
        name="message"
        rows="6"
        required
        placeholder="Tell me about your project..."
        class="w-full resize-none rounded-xl border border-gray-300 bg-gray-50 px-4 py-3 text-gray-900 outline-none transition-all duration-300 placeholder:text-gray-500 hover:border-main focus:border-main dark:border-white/10 dark:bg-[#121214] dark:text-white dark:placeholder:text-gray-500"
      ></textarea>
    </div>

    <!-- Button -->
    <button
      type="submit"
      class="group flex w-full items-center justify-center gap-3 rounded-2xl bg-main px-8 py-4 font-medium text-white transition-all duration-300 hover:scale-[1.02] hover:shadow-lg hover:shadow-main/30 md:w-fit"
    >
      <span>Send Message</span>

      <i
        class="pi pi-send transition-transform duration-300 group-hover:translate-x-1"
      ></i>
    </button>
  </form>
</div>
